<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030014"/>
      <stop offset="100%" stop-color="#0a0528"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="315" r="300" fill="url(#glow1)"/>
  <circle cx="1000" cy="315" r="300" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Diamond icon centered around x:340, y:315 -->
  <g transform="translate(340,315)">
    <!-- Outer diamond -->
    <path d="M 0,-130 L 130,0 L 0,130 L -130,0 Z" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none"/>
    <!-- Mid diamond -->
    <path d="M 0,-95 L 95,0 L 0,95 L -95,0 Z" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none"/>
    <!-- Inner diamond -->
    <path d="M 0,-60 L 60,0 L 0,60 L -60,0 Z" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none"/>
  </g>

  <!-- BADAR EDGE text stacked -->
  <text x="530" y="275" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="4">BADAR</text>
  <text x="530" y="335" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="4">EDGE</text>

  <!-- Tagline -->
  <text x="530" y="355" font-family="'Inter', Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8" letter-spacing="1">Problem-First AI Solutions Company</text>

  <!-- Bottom tagline -->
  <text x="600" y="480" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="400" fill="#475569" text-anchor="middle" letter-spacing="3">PACKAGED SYSTEMS &bull; CUSTOM SOLUTIONS &bull; AI SERVICES</text>
</svg>